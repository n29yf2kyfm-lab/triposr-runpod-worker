<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Seedance Studio</title>
<style>
  :root{
    --bg:#0d0e12; --panel:#16181e; --panel-2:#1c1f27; --line:#282c36;
    --ink:#eef0f4; --dim:#9aa1ad; --accent:#5b8cff; --go:#37d07a; --badge:#f3ef4c; --hot:#fe4d6a;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,system-ui,"Segoe UI",sans-serif;background:
    radial-gradient(130% 90% at 50% -20%,#1a1d25,var(--bg));color:var(--ink);min-height:100dvh}
  .wrap{max-width:1080px;margin:0 auto;padding:26px 18px 60px}
  header{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  header h1{font-size:20px;margin:0;font-weight:750;letter-spacing:-.2px}
  header .dot{width:9px;height:9px;border-radius:50%;background:var(--go);box-shadow:0 0 10px var(--go)}
  .sub{color:var(--dim);font-size:13px;margin:0 0 22px}
  .grid{display:grid;grid-template-columns:1.05fr 1fr;gap:20px}
  @media(max-width:820px){.grid{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px}
  label{display:block;font-size:12px;font-weight:650;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin:2px 0 8px}
  .models{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .model{border:2px solid var(--line);background:var(--panel-2);border-radius:12px;padding:11px 12px;cursor:pointer;transition:.15s}
  .model:hover{border-color:#3a4050}
  .model[aria-selected=true]{border-color:var(--accent);background:#1b2233}
  .model .t{display:flex;align-items:center;gap:7px;font-weight:650;font-size:14px}
  .model .m{color:var(--dim);font-size:11.5px;margin-top:3px}
  .badge{font-size:9.5px;font-weight:800;letter-spacing:.4px;padding:2px 5px;border-radius:5px}
  .badge.api{background:var(--badge);color:#1a1a12}
  .badge.self{background:#2b3a55;color:#bcd0ff}
  .badge.off{background:#3a2530;color:#ff9db0}
  textarea,input,select{width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
    border-radius:10px;padding:11px 12px;font:inherit;font-size:14px;outline:none}
  textarea{min-height:96px;resize:vertical;line-height:1.45}
  textarea:focus,select:focus{border-color:var(--accent)}
  .row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:12px}
  .drop{margin-top:12px;border:1.5px dashed var(--line);border-radius:10px;padding:14px;text-align:center;color:var(--dim);
    font-size:13px;cursor:pointer;background:var(--panel-2)}
  .drop img{max-height:120px;border-radius:8px;margin-top:8px}
  .go{margin-top:16px;width:100%;border:0;border-radius:12px;padding:13px;font-weight:750;font-size:15px;cursor:pointer;
    background:linear-gradient(180deg,#6d97ff,#4d78f0);color:#fff}
  .go:disabled{opacity:.6;cursor:default}
  .result{display:flex;flex-direction:column;min-height:320px}
  .stage{flex:1;display:grid;place-items:center;background:var(--panel-2);border:1px solid var(--line);border-radius:12px;
    overflow:hidden;position:relative;min-height:280px}
  .stage video{width:100%;height:100%;object-fit:contain;background:#000}
  .placeholder{color:var(--dim);font-size:13px;text-align:center;padding:20px}
  .status{margin-top:12px;font-size:13px;color:var(--dim);min-height:18px}
  .status.err{color:var(--hot)}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid #4a5164;border-top-color:var(--accent);
    border-radius:50%;animation:sp .8s linear infinite;vertical-align:-2px;margin-right:7px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .pill{display:inline-block;font-size:11px;color:var(--dim);border:1px solid var(--line);border-radius:20px;padding:3px 9px;margin-left:8px}
</style>
</head>
<body>
<div class="wrap">
  <header><span class="dot"></span><h1>Seedance Studio</h1><span class="pill" id="provPill">provider: …</span></header>
  <p class="sub">Image → video generation. Pick a model, drop a photo, describe the shot. Seedance 2.0 via API, or your self-hosted worker.</p>

  <div class="grid">
    <!-- controls -->
    <div class="card">
      <label>Model</label>
      <div class="models" id="models"></div>

      <label>Prompt</label>
      <textarea id="prompt" placeholder="Slow cinematic orbit around the car, golden-hour light, shallow depth of field, premium commercial look"></textarea>

      <div class="drop" id="drop">
        <span id="dropText">Click to add a starting image (optional → image-to-video)</span>
        <input type="file" id="file" accept="image/*" hidden />
        <div id="preview"></div>
      </div>

      <div class="row">
        <div><label>Duration</label><select id="duration"><option>4</option><option selected>5</option><option>8</option><option>10</option></select></div>
        <div><label>Resolution</label><select id="resolution"><option>480p</option><option selected>720p</option><option>1080p</option></select></div>
        <div><label>Aspect</label><select id="aspect"><option>auto</option><option>16:9</option><option>9:16</option><option>1:1</option></select></div>
      </div>

      <button class="go" id="go">Generate video</button>
      <div class="status" id="status"></div>
    </div>

    <!-- result -->
    <div class="card result">
      <label>Result</label>
      <div class="stage" id="stage"><div class="placeholder">Your generated clip appears here.</div></div>
    </div>
  </div>
</div>

<script>
const MODELS = [
  { id:"seedance-2.0",      name:"Seedance 2.0",      meta:"720p · 4–15s",  kind:"api"  },
  { id:"seedance-2.0-fast", name:"Seedance 2.0 Fast", meta:"720p · faster", kind:"api"  },
  { id:"self-hosted-ltx",   name:"Self-hosted (LTX)", meta:"your RunPod worker", kind:"self" },
];
let selected = "seedance-2.0";
let imageDataUrl = null;
let ready = {};

const el = (id) => document.getElementById(id);
async function boot(){
  const cfg = await fetch("/api/config").then(r=>r.json()).catch(()=>({provider:"demo",ready:{}}));
  ready = cfg.ready || {};
  el("provPill").textContent = "provider: " + cfg.provider;
  renderModels();
}
function badgeFor(m){
  if(m.kind==="self") return ready.runpod ? '<span class="badge self">SELF-HOSTED</span>' : '<span class="badge off">OFFLINE</span>';
  return (ready.fal||ready.replicate) ? '<span class="badge api">API</span>' : '<span class="badge off">NO KEY</span>';
}
function renderModels(){
  el("models").innerHTML = MODELS.map(m=>`
    <div class="model" data-id="${m.id}" aria-selected="${m.id===selected}">
      <div class="t">${m.name} ${badgeFor(m)}</div>
      <div class="m">${m.meta}</div>
    </div>`).join("");
  document.querySelectorAll(".model").forEach(x=>x.onclick=()=>{selected=x.dataset.id;renderModels();});
}
el("drop").onclick = ()=> el("file").click();
el("file").onchange = (e)=>{
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{ imageDataUrl = r.result;
    el("preview").innerHTML = `<img src="${imageDataUrl}" alt="start frame">`;
    el("dropText").textContent = "Starting image added — click to replace"; };
  r.readAsDataURL(f);
};
el("go").onclick = async ()=>{
  const prompt = el("prompt").value.trim();
  if(!prompt){ setStatus("Enter a prompt first.", true); return; }
  el("go").disabled = true;
  setStatus('<span class="spin"></span>Generating on ' + selected + '…');
  el("stage").innerHTML = '<div class="placeholder"><span class="spin"></span><br>Rendering… this can take a bit.</div>';
  try{
    const body = { prompt, imageDataUrl, model: selected, opts:{
      duration: el("duration").value, resolution: el("resolution").value, aspectRatio: el("aspect").value } };
    const res = await fetch("/api/generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    const data = await res.json();
    if(!res.ok) throw new Error(data.error||"generation failed");
    const src = data.videoUrl || (data.videoBase64 ? "data:video/mp4;base64,"+data.videoBase64 : null);
    if(!src) throw new Error("no video returned");
    el("stage").innerHTML = `<video src="${src}" controls autoplay loop muted playsinline></video>`;
    setStatus(`Done in ${(data.ms/1000).toFixed(1)}s · ${data.provider}${data.note? " · "+data.note:""}`);
  }catch(err){
    el("stage").innerHTML = '<div class="placeholder">Generation failed.</div>';
    setStatus(err.message, true);
  }finally{ el("go").disabled = false; }
};
function setStatus(html, err){ const s=el("status"); s.innerHTML=html; s.className="status"+(err?" err":""); }
boot();
</script>
</body>
</html>
