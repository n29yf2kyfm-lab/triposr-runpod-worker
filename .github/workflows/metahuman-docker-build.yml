name: Build and Push MetaHuman Docker Image

on:
  push:
    branches: [ main ]
    paths:
      - 'metahuman/**'
      - '.github/workflows/metahuman-docker-build.yml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The CUDA devel base + torch + baked-in ~1.5GB weights don't fit in the
      # ~14GB free on a stock ubuntu-latest runner. Strip preinstalled SDKs
      # before the build starts.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
          docker-images: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: metahuman
          push: true
          # SHA-based tag alongside :metahuman-latest so RunPod pulls fresh
          # content instead of reusing a cached image for a tag name it's
          # already seen (observed stale-worker behavior on the other workers).
          tags: |
            alamk123/ai-mechanic:metahuman-v1
            alamk123/ai-mechanic:metahuman-latest
            alamk123/ai-mechanic:metahuman-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
