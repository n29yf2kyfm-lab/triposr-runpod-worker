name: Build and Push Grounded-SAM Docker Image

on:
  push:
    branches: [ main, claude/lovable-connection-ki7jch ]
    paths:
      - 'groundedsam/**'
      - '.github/workflows/groundedsam-docker-build.yml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # CUDA runtime base + torch wheels + transformers do not fit in the free
      # space on a stock runner. Reclaim it before the build starts.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
          docker-images: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: groundedsam
          push: true
          # Own tags so it never clobbers the TRELLIS / render images. Point a
          # new GPU endpoint at :gsam-latest; the SHA tag forces a fresh pull.
          tags: |
            alamk123/ai-mechanic:gsam-latest
            alamk123/ai-mechanic:gsam-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
