name: Build and Push Seedance Video Docker Image

on:
  push:
    branches: [ main ]
    paths:
      - 'seedance-video/**'
      - '.github/workflows/seedance-docker-build.yml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: seedance-video
          push: true
          # SHA-based tag alongside :seedance-latest so RunPod is forced to pull
          # fresh content instead of reusing a cached image for a tag it has
          # already seen (same stale-worker guard as the other workers here).
          tags: |
            alamk123/ai-mechanic:seedance-v1
            alamk123/ai-mechanic:seedance-latest
            alamk123/ai-mechanic:seedance-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
