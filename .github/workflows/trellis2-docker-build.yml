name: Build and Push TRELLIS.2 Docker Image

on:
  push:
    branches: [ main ]
    paths:
      - 'trellis2/**'
      - '.github/workflows/trellis2-docker-build.yml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # cu124 devel base + torch 2.6 wheels + six compiled extensions (flash-attn,
      # nvdiffrast, nvdiffrec, CuMesh, FlexGEMM, o-voxel) does not fit in the ~14GB
      # free on a stock ubuntu-latest runner. Strip preinstalled SDKs first.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
          docker-images: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: trellis2
          push: true
          # SHA-based tag alongside :trellis2-latest so RunPod is forced to pull
          # fresh content instead of reusing a cached image for a tag it has
          # already seen (same stale-worker workaround as the v1 build).
          tags: |
            alamk123/ai-mechanic:trellis2-v1
            alamk123/ai-mechanic:trellis2-latest
            alamk123/ai-mechanic:trellis2-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
