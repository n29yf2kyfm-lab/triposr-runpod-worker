name: Build and Push Render Docker Image

on:
  push:
    branches: [ main, claude/lovable-connection-ki7jch ]
    paths:
      - 'render/**'
      - '.github/workflows/render-docker-build.yml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
          docker-images: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: render
          push: true
          # Own tags so this never clobbers the TRELLIS image. Point a GPU
          # serverless endpoint at :render-latest. The SHA tag forces RunPod to
          # pull fresh instead of reusing a cached tag.
          tags: |
            alamk123/ai-mechanic:render-latest
            alamk123/ai-mechanic:render-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
