name: Build and Push TRELLIS Docker Image

on:
  push:
    branches: [ main, claude/lovable-connection-ki7jch ]
    paths:
      - 'trellis/**'
      - '.github/workflows/trellis-docker-build.yml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # This image (nvidia/cuda:12.1.0-devel base + torch CUDA wheels + compiled
      # extensions) does not fit in the ~14GB free on a stock ubuntu-latest runner.
      # Strip GitHub's preinstalled SDKs we don't need before the build even starts.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
          docker-images: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: trellis
          push: true
          # TRELLIS.2 ships under its OWN tags so it can't clobber the working
          # v1 image (alamk123/ai-mechanic:trellis-latest / :trellis-v1) that the
          # current live endpoint runs on. Point a new 24GB endpoint at
          # :trellis2-latest when ready; v1 keeps serving until then. The
          # SHA tag forces RunPod to pull fresh instead of reusing a cached tag.
          tags: |
            alamk123/ai-mechanic:trellis2-latest
            alamk123/ai-mechanic:trellis2-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
