[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ifcopenshell"
version = "0.0.0"
authors = [
  { name="Dion Moult", email="dion@thinkmoult.com" },
]
description = "Python bindings, utility functions, and high-level API for IfcOpenShell"
readme = "README.md"
requires-python = ">=3.10,<3.15"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: GNU Lesser General Public License v3 or later (LGPLv3+)",
]
dependencies = [
    "shapely",
    "numpy",
    "isodate",
    "python-dateutil",
    "lark",
    "pyparsing",
    "typing-extensions",
]

[project.optional-dependencies]
advanced = [
  # `express` module - only for generating schemas.
  "networkx",
]
dev = [
  "pytest",
  "tabulate",
  "types-networkx",
]

[project.urls]
"Homepage" = "http://ifcopenshell.org"
"Bug Tracker" = "https://github.com/ifcopenshell/ifcopenshell/issues"

[tool.setuptools.packages.find]
include = ["ifcopenshell*"]

[tool.setuptools.package-data]
"*" = ["*.*"]

[tool.ruff]
extend = "../../pyproject.toml"
lint.select = [
  "F401",  # unused imports
]
